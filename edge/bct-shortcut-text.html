content :: bbc select (us & ca)
BBC Select and BritBox are separate subscription services. A BBC Select subscription through Amazon, Apple TV, Roku, or another provider does not include access to the BritBox or our apps. In the US and Canada, select BBC Select documentaries are included with BritBox Premier, but standalone BBC Select subscriptions are managed separately. BBC Select cancellations are handled directly through the platform where the subscription was purchased. Let me know if I can help with anything else!
All agents


content :: bbc select vs britbox
BBC Select and BritBox are separate subscription services. A BBC Select subscription through Amazon, Apple TV, Roku, or another provider does not include access to the BritBox or our apps. BBC Select subscriptions, including cancellations, are managed directly through the platform where you signed up. Let me know if I can help with anything else!
All agents


content :: britbox vs. bbc
BritBox is a streaming service first launched by the BBC & ITV, now fully owned by the BBC! We offer a comprehensive collection of beloved British TV shows. Our lineup includes favorites from both, alongside new and exclusive content, for a refreshing experience. It's important to note that our programming may differ from the BBC, with exclusive content available on each platform, or shared between.
All agents

content :: standard sub ea explanation (us & ca)
With a Standard subscription, episodes arrive on their regular release dates, just as you’re used to. If you’d like to watch certain titles even sooner, upgrading to Premier gives you Early Access to eligible shows. Some seasons become available all at once, while others arrive episode by episode, but all are released ahead of the regular schedule. You can find release dates for each episode in the BritBox app or on our website.
All agents

content :: standard sub ea general (us & ca)
Early Access allows our Premier subscribers to enjoy select new and returning shows before they become available to all BritBox viewers. If you’re seeing a message to upgrade, it means that the title is part of our Early Access lineup. Your Standard subscription still includes the show; it will just be available a little later. For example, <INSERT SHOW/FILM TITLE> <INSERT EPISODE> is available now, and <INSERT EPISODE> will be available to all subscribers on <INSERT RELEASE DATE>.
